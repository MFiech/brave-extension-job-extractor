<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }
    
    .extract-btn {
      width: 100%;
      padding: 12px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 15px;
      transition: background-color 0.2s;
    }
    
    .extract-btn:hover {
      background-color: #3367d6;
    }
    
    .extract-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      display: none;
    }
    
    .status.loading {
      background-color: #e3f2fd;
      color: #1976d2;
      display: block;
    }
    
    .status.success {
      background-color: #e8f5e8;
      color: #2e7d32;
      display: block;
    }
    
    .status.error {
      background-color: #ffebee;
      color: #c62828;
      display: block;
    }
    
    .config {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    
    .config label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .config input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
    }
    
    .config .input-group {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Job Info Extractor</h1>
  </div>
  
  <button id="extractBtn" class="extract-btn">Extract Job Info</button>
  <button id="debugBtn" class="extract-btn" style="background-color: #666; margin-top: 5px;">Show Debug Logs</button>
  
  <div id="status" class="status"></div>
  
  <div id="debugPanel" style="display: none; margin-top: 15px; padding: 10px; background: #f5f5f5; border-radius: 4px; max-height: 300px; overflow-y: auto;">
    <h3 style="margin: 0 0 10px 0; font-size: 14px;">Debug Logs</h3>
    <button id="clearLogsBtn" style="margin-bottom: 10px; padding: 4px 8px; font-size: 11px;">Clear Logs</button>
    <div id="debugLogs" style="font-family: monospace; font-size: 10px; white-space: pre-wrap; background: white; padding: 8px; border-radius: 3px; border: 1px solid #ddd;"></div>
  </div>
  
  <div class="config">
    <div class="input-group">
      <label for="openaiKey">OpenAI API Key:</label>
      <input type="password" id="openaiKey" placeholder="Enter your OpenAI API key">
    </div>
    <div class="input-group">
      <label for="localApiUrl">Webhook URL:</label>
      <input type="text" id="localApiUrl" placeholder="http://localhost:5678/webhook/your-webhook-id">
    </div>
  </div>
  
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
